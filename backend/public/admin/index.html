<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AppSync Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --md-primary: #1A73E8;
  --md-primary-light: #E8F0FE;
  --md-primary-container: #D2E3FC;
  --md-on-primary: #FFFFFF;
  --md-secondary: #5F6368;
  --md-secondary-container: #F1F3F4;
  --md-error: #D93025;
  --md-error-container: #FCE8E6;
  --md-surface: #FFFFFF;
  --md-surface-dim: #F8F9FA;
  --md-surface-container: #F1F3F4;
  --md-on-surface: #202124;
  --md-on-surface-variant: #5F6368;
  --md-outline: #DADCE0;
  --md-outline-variant: #E8EAED;
  --md-elevation-1: 0 1px 2px rgba(60,64,67,0.06), 0 1px 3px rgba(60,64,67,0.10);
  --md-elevation-2: 0 1px 2px rgba(60,64,67,0.08), 0 2px 4px rgba(60,64,67,0.12);
  --md-elevation-3: 0 2px 6px rgba(60,64,67,0.08), 0 4px 8px rgba(60,64,67,0.12);
  --md-elevation-4: 0 4px 8px rgba(60,64,67,0.08), 0 8px 16px rgba(60,64,67,0.12);
  --md-radius-sm: 4px;
  --md-radius-md: 8px;
  --md-radius-lg: 12px;
  --md-radius-xl: 16px;
  --md-transition: 0.2s cubic-bezier(0.2, 0, 0, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
  background: var(--md-surface-dim);
  color: var(--md-on-surface);
  font-size: 14px;
  line-height: 20px;
  -webkit-font-smoothing: antialiased;
}

.login-wrap {
  max-width: 380px;
  margin: 80px auto;
  background: var(--md-surface);
  padding: 40px;
  border-radius: var(--md-radius-xl);
  box-shadow: var(--md-elevation-3);
}
.login-wrap h1 { font-size: 22px; font-weight: 500; margin-bottom: 24px; text-align: center; }
.login-wrap .logo {
  width: 48px; height: 48px; border-radius: 12px;
  background: linear-gradient(135deg, var(--md-primary), #4285F4);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 24px; font-weight: 700;
  margin: 0 auto 16px auto;
}
.login-wrap .subtitle { text-align: center; color: var(--md-on-surface-variant); font-size: 14px; margin-bottom: 24px; }
.login-wrap input {
  width: 100%; padding: 10px 14px; margin-bottom: 16px;
  border: 1px solid var(--md-outline); border-radius: var(--md-radius-md);
  font-size: 14px; font-family: inherit; color: var(--md-on-surface);
  background: var(--md-surface-dim); outline: none;
  transition: var(--md-transition);
}
.login-wrap input:focus {
  border-color: var(--md-primary);
  box-shadow: 0 0 0 2px var(--md-primary-light);
}
.login-wrap label {
  display: block; font-size: 13px; font-weight: 500;
  color: var(--md-on-surface-variant); margin-bottom: 6px;
}
.login-wrap button {
  width: 100%; padding: 12px; margin-top: 4px;
  background: var(--md-primary); color: var(--md-on-primary);
  border: none; border-radius: var(--md-radius-md);
  font-size: 15px; font-weight: 500; cursor: pointer;
  box-shadow: var(--md-elevation-1); transition: var(--md-transition);
  font-family: inherit;
}
.login-wrap button:hover { background: #1B66C9; box-shadow: var(--md-elevation-2); }
.login-wrap .err {
  color: var(--md-error); font-size: 13px; margin-bottom: 12px;
  padding: 10px 14px; background: var(--md-error-container);
  border-radius: var(--md-radius-md); display: none;
}

.app-wrap { display: none; max-width: 840px; margin: 0 auto; padding: 24px; }

header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px; padding-bottom: 16px;
  border-bottom: 1px solid var(--md-outline);
}
header h1 { font-size: 20px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
header h1 .badge {
  font-size: 11px; font-weight: 500;
  background: var(--md-primary-light); color: var(--md-primary);
  padding: 2px 8px; border-radius: 4px;
}
header .user-info { display: flex; align-items: center; gap: 12px; }
header .user-info span { font-size: 13px; color: var(--md-on-surface-variant); }
header button {
  padding: 6px 16px; cursor: pointer;
  border: 1px solid var(--md-outline); border-radius: var(--md-radius-md);
  background: var(--md-surface); font-size: 13px; font-family: inherit;
  color: var(--md-on-surface); transition: var(--md-transition);
}
header button:hover { background: var(--md-surface-container); }

.tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--md-surface-container); padding: 4px; border-radius: var(--md-radius-md); }
.tabs button {
  flex: 1; padding: 8px 20px; cursor: pointer;
  border: none; border-radius: 6px; font-size: 13px; font-weight: 500;
  font-family: inherit; background: transparent; color: var(--md-on-surface-variant);
  transition: var(--md-transition);
}
.tabs button.active { background: var(--md-surface); color: var(--md-primary); box-shadow: var(--md-elevation-1); }
.tabs button:hover:not(.active) { background: var(--md-surface-dim); }

.card {
  background: var(--md-surface);
  border-radius: var(--md-radius-lg);
  padding: 14px 18px;
  margin-bottom: 8px;
  border: 1px solid var(--md-outline);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: var(--md-transition);
}
.card:hover { box-shadow: var(--md-elevation-1); border-color: var(--md-outline-variant); }
.card .info { flex: 1; min-width: 0; }
.card .name { font-weight: 500; font-size: 14px; }
.card .url { font-size: 12px; color: var(--md-on-surface-variant); word-break: break-all; margin-top: 2px; }
.card .meta { font-size: 11px; color: var(--md-on-surface-variant); margin-top: 3px; }
.card .actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 12px; }
.btn {
  padding: 5px 14px; cursor: pointer;
  border: none; border-radius: 6px; font-size: 12px; font-weight: 500;
  font-family: inherit; transition: var(--md-transition);
}
.btn-approve { background: #34A853; color: #fff; }
.btn-approve:hover { background: #2E7D32; }
.btn-reject { background: var(--md-error); color: #fff; }
.btn-reject:hover { background: #C5221F; }
.btn-admin { background: var(--md-primary); color: #fff; }
.btn-admin:hover { background: #1B66C9; }
.btn-demote { background: #EA8600; color: #fff; }
.btn-demote:hover { background: #D67A00; }
.btn-del { background: var(--md-error); color: #fff; }
.btn-del:hover { background: #C5221F; }
.btn:active { transform: scale(0.97); }

.empty-state {
  text-align: center;
  padding: 80px 40px;
  color: var(--md-on-surface-variant);
  background: var(--md-surface);
  border-radius: var(--md-radius-xl);
  border: 1px solid var(--md-outline);
  margin-top: 8px;
}
.empty-state .icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--md-tertiary-container, #CEEAD6);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px auto;
  font-size: 32px;
}
.empty-state h3 { font-size: 18px; font-weight: 500; color: var(--md-on-surface); margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: var(--md-on-surface-variant); max-width: 320px; margin: 0 auto; line-height: 1.6; }

/* Toast */
.toast-container {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  z-index: 10001;
  display: flex; flex-direction: column-reverse; gap: 8px;
  max-width: 420px; width: 90%;
  pointer-events: none;
}
.toast {
  background: var(--md-surface);
  border-radius: 12px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--md-elevation-4);
  font-size: 14px;
  pointer-events: auto;
  animation: toastIn 0.25s ease;
}
.toast.toast-exit { animation: toastOut 0.2s ease forwards; }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(10px) scale(0.95); } }
.toast .toast-icon {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.toast .toast-close {
  background: none; border: none; cursor: pointer; padding: 2px;
  color: var(--md-ref-on-surface-variant); font-size: 16px; line-height: 1;
  margin-left: auto;
}
.toast-success .toast-icon { background: #CEEAD6; color: #34A853; }
.toast-error .toast-icon { background: #FCE8E6; color: #D93025; }
.toast-info .toast-icon { background: #E8F0FE; color: #1A73E8; }
.toast-warning .toast-icon { background: #FEF7E0; color: #EA8600; }
.toast-success { border-left: 4px solid #34A853; }
.toast-error { border-left: 4px solid #D93025; }
.toast-info { border-left: 4px solid #1A73E8; }
.toast-warning { border-left: 4px solid #EA8600; }

/* Confirm Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 10000;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.modal-exit { animation: fadeOut 0.2s ease forwards; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
.modal-box {
  background: var(--md-surface);
  border-radius: 16px;
  padding: 28px;
  min-width: 340px;
  max-width: 420px;
  box-shadow: var(--md-elevation-4);
  animation: modalIn 0.25s ease;
}
.modal-box.modal-exit { animation: modalOut 0.2s ease forwards; }
@keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
@keyframes modalOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }
.modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.modal-header .modal-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.modal-header h3 { margin: 0; font-size: 16px; font-weight: 500; color: var(--md-on-surface); }
.modal-body { color: var(--md-on-surface-variant); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button {
  padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: var(--md-transition);
}
.modal-actions .btn-cancel {
  border: 1px solid var(--md-outline); background: transparent; color: var(--md-on-surface);
}
.modal-actions .btn-cancel:hover { background: var(--md-surface-container); }
.modal-actions .btn-confirm-danger {
  border: none; background: #D93025; color: #fff; box-shadow: var(--md-elevation-1);
}
.modal-actions .btn-confirm-danger:hover { background: #C5221F; }
.modal-actions .btn-confirm-ok {
  border: none; background: var(--md-primary); color: #fff; box-shadow: var(--md-elevation-1);
}
.modal-actions .btn-confirm-ok:hover { background: #1B66C9; }

@media (prefers-color-scheme: dark) {
  :root {
    --md-primary: #8AB4F8;
    --md-primary-light: #1E3A5F;
    --md-primary-container: #1A3A5C;
    --md-on-primary: #202124;
    --md-secondary: #9AA0A6;
    --md-secondary-container: #303134;
    --md-error: #F28B82;
    --md-error-container: #3C1E1E;
    --md-surface: #1E1E1E;
    --md-surface-dim: #121212;
    --md-surface-container: #2D2D2D;
    --md-on-surface: #E8EAED;
    --md-on-surface-variant: #9AA0A6;
    --md-outline: #5F6368;
    --md-outline-variant: #3C4043;
    --md-elevation-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.4);
    --md-elevation-2: 0 1px 2px rgba(0,0,0,0.35), 0 2px 4px rgba(0,0,0,0.4);
    --md-elevation-3: 0 2px 6px rgba(0,0,0,0.35), 0 4px 8px rgba(0,0,0,0.4);
    --md-elevation-4: 0 4px 8px rgba(0,0,0,0.35), 0 8px 16px rgba(0,0,0,0.4);
  }
  .login-wrap input { background: var(--md-surface-container); color: var(--md-on-surface); border-color: var(--md-outline); }
  .login-wrap input:focus { border-color: var(--md-primary); box-shadow: 0 0 0 2px var(--md-primary-light); }
}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <svg width="48" height="48" viewBox="0 0 128 128" fill="none" style="border-radius:12px;display:block;margin:0 auto 16px">
    <rect width="128" height="128" rx="28" fill="#6750A4"/>
    <path d="M42 48L64 30L86 48" stroke="#EADDFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 80L64 98L86 80" stroke="#EADDFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <line x1="64" y1="34" x2="64" y2="94" stroke="#EADDFF" stroke-width="5" stroke-linecap="round"/>
    <polyline points="56,66 48,74 56,82" stroke="#D0BCFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="72,62 80,54 72,46" stroke="#D0BCFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </svg>
  <h1>AppSync Admin</h1>
  <p class="subtitle">Sign in to manage the system</p>
  <div class="err" id="loginErr"></div>
  <label>Email</label>
  <input type="email" id="email" placeholder="admin@example.com">
  <label>Password</label>
  <input type="password" id="password" placeholder="Enter your password">
  <button id="loginBtn">Sign In</button>
</div>

<div class="app-wrap" id="appWrap">
  <header>
    <h1>
      <span>AppSync</span>
      <span class="badge">Admin</span>
    </h1>
    <div class="user-info">
      <span id="userEmail"></span>
      <button id="signOutBtn">Sign out</button>
    </div>
  </header>

  <div class="tabs">
    <button class="active" id="tabReview">Pending Review</button>
    <button id="tabUsers">User Management</button>
  </div>

  <div id="panelReview"></div>
  <div id="panelUsers" style="display:none"></div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script>
const API = '/api/v1';
let token = localStorage.getItem('admin_token');
let currentUserId = null;
let toastId = 0;

var ICON_MAP = { success: '\u2713', error: '\u2715', info: '\u2139', warning: '\u26A0' };

function showToast(message, type) {
  type = type || 'info';
  const container = document.getElementById('toastContainer');
  const id = ++toastId;
  var el = h('div', {className: 'toast toast-' + type, id: 'toast-' + id}, [
    h('span', {className: 'toast-icon'}, [ICON_MAP[type] || ICON_MAP.info]),
    h('span', {}, [esc(message)]),
    h('button', {className: 'toast-close', onclick: function() { removeToast(id); }}, ['\u2715']),
  ]);
  container.appendChild(el);
  setTimeout(function() { removeToast(id); }, 3500);
}

function removeToast(id) {
  var el = document.getElementById('toast-' + id);
  if (!el) return;
  el.classList.add('toast-exit');
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 200);
}

function showConfirm(message, danger) {
  return new Promise(function(resolve) {
    var box = h('div', {className: 'modal-box'}, [
      h('div', {className: 'modal-header'}, [
        h('div', {className: 'modal-icon', style: 'background:var(--md-ref-orange-container)'}, ['\u26A0']),
        h('h3', {}, ['Confirm']),
      ]),
      h('div', {className: 'modal-body'}, [esc(message)]),
      h('div', {className: 'modal-actions'}, [
        h('button', {className: 'btn-cancel', id: 'confirmCancel'}, ['Cancel']),
        h('button', {className: danger !== false ? 'btn-confirm-danger' : 'btn-confirm-ok', id: 'confirmOk'}, [danger !== false ? 'Delete' : 'OK']),
      ]),
    ]);
    var overlay = h('div', {className: 'modal-overlay'}, [box]);
    document.body.appendChild(overlay);
    function close(result) {
      overlay.classList.add('modal-exit');
      setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); resolve(result); }, 200);
    }
    document.getElementById('confirmCancel').onclick = function() { close(false); };
    document.getElementById('confirmOk').onclick = function() { close(true); };
    overlay.onclick = function(e) { if (e.target === overlay) close(false); };
  });
}

async function req(path, opts) {
  opts = opts || {};
  var h = { 'Content-Type': 'application/json' };
  if (opts.headers) Object.assign(h, opts.headers);
  if (token) h['Authorization'] = 'Bearer ' + token;
  var r = await fetch(API + path, { method: opts.method || 'GET', body: opts.body || null, headers: h });
  if (r.status === 401 && token) {
    var refresh = await fetch(API + '/auth/refresh', { method: 'POST', headers: h });
    if (refresh.ok) {
      var d = await refresh.json();
      token = d.token; localStorage.setItem('admin_token', token);
      h['Authorization'] = 'Bearer ' + token;
      return fetch(API + path, { method: opts.method || 'GET', body: opts.body || null, headers: h });
    }
  }
  return r;
}

document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('signOutBtn').addEventListener('click', logout);
document.getElementById('tabReview').addEventListener('click', function() { switchTab('review'); });
document.getElementById('tabUsers').addEventListener('click', function() { switchTab('users'); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') login();
});

async function login() {
  document.getElementById('loginErr').style.display = 'none';
  var r = await req('/auth/login', {
    method: 'POST',
    body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
  });
  var d = await r.json();
  if (!r.ok) {
    document.getElementById('loginErr').textContent = d.error;
    document.getElementById('loginErr').style.display = 'block';
    return;
  }
  token = d.token; localStorage.setItem('admin_token', token);
  if (!d.user.is_admin) {
    document.getElementById('loginErr').textContent = 'Not an admin account';
    document.getElementById('loginErr').style.display = 'block';
    return;
  }
  currentUserId = d.user.id;
  document.getElementById('userEmail').textContent = d.user.email;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').style.display = 'block';
  loadReview();
}

function logout() { token = null; localStorage.removeItem('admin_token'); location.reload(); }

async function loadReview() {
  var r = await req('/downloads/links/pending');
  if (!r.ok) return;
  var list = await r.json();
  document.getElementById('tabReview').textContent = 'Pending Review (' + list.length + ')';
  var panel = clearPanel('panelReview');

  if (list.length === 0) {
    panel.appendChild(h('div', {className: 'empty-state'}, [
      h('div', {className: 'icon'}, ['\u2705']),
      h('h3', {}, ['All clear!']),
      h('p', {}, ['No pending submissions. Every submitted link has been reviewed. Check back later for new submissions.']),
    ]));
    return;
  }

  list.forEach(function(l) {
    var metaParts = [(l.category || 'Uncategorized'), '\u00b7 by ', (l.contributor_email || 'anonymous')];
    if (l.aliases && l.aliases.length) metaParts.push(' \u00b7 aliases: ' + l.aliases.join(', '));

    var card = h('div', {className: 'card'}, [
      h('div', {className: 'info'}, [
        h('div', {className: 'name'}, [esc(l.software_name)]),
        h('div', {className: 'url'}, [esc(l.official_url)]),
        h('div', {className: 'meta'}, metaParts),
      ]),
      h('div', {className: 'actions'}, [
        h('button', {className: 'btn btn-approve', onclick: function() { verify(l.id, true); }}, ['Approve']),
        h('button', {className: 'btn btn-reject', onclick: function() { verify(l.id, false); }}, ['Reject']),
      ]),
    ]);
    panel.appendChild(card);
  });
}

async function verify(id, ok) {
  await req('/downloads/links/' + id + '/verify', { method: 'PUT', body: JSON.stringify({ verified: ok }) });
  showToast(ok ? 'Link approved' : 'Link rejected', ok ? 'success' : 'info');
  loadReview();
}

async function loadUsers() {
  var r = await req('/auth/users');
  if (!r.ok) return;
  var list = await r.json();
  var panel = clearPanel('panelUsers');

  if (list.length === 0) {
    panel.appendChild(h('div', {className: 'empty-state'}, [
      h('div', {className: 'icon'}, ['\uD83D\uDC65']),
      h('h3', {}, ['No users yet']),
      h('p', {}, ['There are no registered users in the system right now.']),
    ]));
    return;
  }

  list.forEach(function(u) {
    var isSelf = u.id === currentUserId;
    var nameParts = [esc(u.nickname || u.email)];
    nameParts.push(h('span', {style: 'font-weight:400;color:var(--md-on-surface-variant);font-size:13px'}, [' ' + esc(u.email)]));
    if (u.is_admin) nameParts.push(h('span', {style: 'font-size:10px;font-weight:500;background:var(--md-primary);color:var(--md-on-primary);padding:1px 7px;border-radius:4px'}, ['Admin']));
    if (isSelf) nameParts.push(h('span', {style: 'font-size:11px;color:var(--md-on-surface-variant)'}, [' (you)']));

    var actions;
    if (isSelf) {
      actions = [h('span', {style: 'font-size:11px;color:var(--md-on-surface-variant);padding:5px 8px'}, ['Cannot modify self'])];
    } else {
      actions = [
        u.is_admin
          ? h('button', {className: 'btn btn-demote', onclick: function() { toggleAdmin(u.id, false); }}, ['Demote'])
          : h('button', {className: 'btn btn-admin', onclick: function() { toggleAdmin(u.id, true); }}, ['Make Admin']),
        h('button', {className: 'btn btn-del', onclick: function() { delUser(u.id); }}, ['Delete']),
      ];
    }

    panel.appendChild(h('div', {className: 'card'}, [
      h('div', {className: 'info'}, [
        h('div', {className: 'name'}, nameParts),
        h('div', {className: 'meta'}, ['ID: ' + u.id + ' \u00b7 Inventories: ' + (u.inventory_count || 0)]),
      ]),
      h('div', {className: 'actions'}, actions),
    ]));
  });
}

async function toggleAdmin(id, make) {
  if (id === currentUserId) { showToast('You cannot change your own admin status.', 'warning'); return; }
  if (!make) {
    var ok = await showConfirm('Demote this admin to regular user?', false);
    if (!ok) return;
  }
  var r = await req('/auth/users/' + id + '/admin', { method: 'PUT', body: JSON.stringify({ is_admin: make }) });
  if (!r.ok) { var e = await r.json(); showToast(e.error || 'Failed', 'error'); return; }
  showToast(make ? 'User promoted to admin' : 'Admin demoted to user', 'success');
  loadUsers();
}

async function delUser(id) {
  if (id === currentUserId) { showToast('You cannot delete your own account.', 'warning'); return; }
  var ok = await showConfirm('Delete this user and all their data? This cannot be undone.', true);
  if (!ok) return;
  var r = await req('/auth/users/' + id, { method: 'DELETE' });
  if (!r.ok) { var e = await r.json(); showToast(e.error || 'Failed', 'error'); return; }
  showToast('User deleted', 'success');
  loadUsers();
}

function switchTab(name) {
  document.getElementById('tabReview').className = '';
  document.getElementById('tabUsers').className = '';
  document.getElementById('panelReview').style.display = 'none';
  document.getElementById('panelUsers').style.display = 'none';
  if (name === 'review') {
    document.getElementById('tabReview').className = 'active';
    document.getElementById('panelReview').style.display = 'block';
    loadReview();
  } else {
    document.getElementById('tabUsers').className = 'active';
    document.getElementById('panelUsers').style.display = 'block';
    loadUsers();
  }
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function h(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) for (var k in attrs) { if (k === 'className') el.className = attrs[k]; else if (k === 'onclick') el.onclick = attrs[k]; else el.setAttribute(k, attrs[k]); }
  if (typeof children === 'string') { el.textContent = children; }
  else if (children) { children.forEach(function(c) { if (typeof c === 'string') el.appendChild(document.createTextNode(c)); else if (c) el.appendChild(c); }); }
  return el;
}

function clearPanel(id) {
  var p = document.getElementById(id);
  while (p.firstChild) p.removeChild(p.firstChild);
  return p;
}

if (token) {
  fetch(API + '/auth/profile', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) { return r.json(); }).then(function(user) {
      if (user.is_admin) {
        currentUserId = user.id;
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('appWrap').style.display = 'block';
        loadReview();
      }
    }).catch(function() {});
}
</script>
</body>
